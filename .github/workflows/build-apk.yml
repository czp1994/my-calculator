name: Build Android APK And Auto Deploy Server

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust Decryptor libraries
        run: |
          cd rust_crypto
          cargo ndk -t arm64-v8a -t x86_64 build --release
          cd ..

      - name: ✨ 自定义代码加密混淆 (Rust-based)
        run: |
          cd rust_crypto
          cargo run --release --bin encryptor -- ../main.py ../payload.bin
          cd ..
          rm main.py
          cp rust_crypto/target/aarch64-linux-android/release/libdecryptor.so libdecryptor_aarch64.so
          cp rust_crypto/target/x86_64-linux-android/release/libdecryptor.so libdecryptor_x86_64.so
          mv loader.py main.py

      - name: 🚀 执行跨平台安卓打包
        run: |
          flet build apk

      - name: 📤 输出最终安装包
        uses: actions/upload-artifact@v4
        with:
          name: AppleCalculator-v1.0-APK
          path: build/apk/**/*.apk

# ===========================================================================
# 👇 下面这段是修好的自动部署服务器，不会再报错
# 精简yml只上传apk，不执行启动命令
  deploy:
      needs: build
      runs-on: ubuntu-latest
      steps:
        # 第一步：把上面 build 环节打包好的 APK 下载到当前流水线的 my_apk 临时文件夹里
        - name: 📥 获取打包好的 APK
          uses: actions/download-artifact@v4
          with:
            name: AppleCalculator-v1.0-APK
            path: my_apk
  
        # 第二步：直接通过纯正的 SSH 协议，安全免密地塞进你的阿里云
        - name: 📦 纯文件传输 APK 到 ECS 服务器
          uses: appleboy/scp-action@master
          with:
            host: ${{ secrets.ECS_HOST }}
            username: "deploy"
            key: ${{ secrets.ECS_SSH_KEY }}
            source: "my_apk/**/*.apk"
            target: "/opt/myapp/static/"  # 在这里写上你真正存放安卓下载包的服务端路径
            strip_components: 1           # 剥离前缀，直接把干净的 apk 文件扔到目标目录下



