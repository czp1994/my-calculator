name: Build Android APK And Auto Deploy Server

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust Decryptor libraries
        run: |
          cd rust_crypto
          cargo ndk -t arm64-v8a -t x86_64 build --release
          cd ..

      - name: ✨ 自定义代码加密混淆 (Rust-based)
        run: |
          cd rust_crypto
          cargo run --release --bin encryptor -- ../main.py ../payload.bin
          cd ..
          rm main.py
          cp rust_crypto/target/aarch64-linux-android/release/libdecryptor.so libdecryptor_aarch64.so
          cp rust_crypto/target/x86_64-linux-android/release/libdecryptor.so libdecryptor_x86_64.so
          mv loader.py main.py

      - name: 🚀 执行跨平台安卓打包
        run: |
          flet build apk

      - name: 📤 输出最终安装包
        uses: actions/upload-artifact@v4
        with:
          name: AppleCalculator-v1.0-APK
          path: build/apk/**/*.apk

# ===========================================================================
# 👇 下面这段是修好的自动部署服务器，不会再报错
# 精简yml只上传apk，不执行启动命令
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取回构建环节打好的 APK
        uses: actions/download-artifact@v4
        with:
          name: AppleCalculator-v1.0-APK
          path: my_apk

      # 加一个调试动作，打印一下下载下来的文件结构（哪怕失败我们能在日志里看清究竟下到了啥）
      - name: 🔍 确认下载的文件
        run: ls -R my_apk/

      - name: 📦 纯物理传输 APK 到 ECS 服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ECS_HOST }}
          username: "deploy"
          key: ${{ secrets.ECS_SSH_KEY }}
          # 核心修复在这里：绝不能用含有双星号的路径，直接传整个前置下载文件夹！
          source: "my_apk"              
          target: "/opt/myapp/static/"  
          # 剥离刚才上面临时产生的 my_apk 这一层最外皮，让它里面的文件干干净净裸落入 static。
          strip_components: 1           



