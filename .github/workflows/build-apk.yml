name: Build Android APK And Auto Deploy Server

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust Decryptor libraries
        run: |
          cd rust_crypto
          cargo ndk -t arm64-v8a -t x86_64 build --release
          cd ..

      - name: ✨ 自定义代码加密混淆 (Rust-based)
        run: |
          cd rust_crypto
          cargo run --release --bin encryptor -- ../main.py ../payload.bin
          cd ..
          rm main.py
          cp rust_crypto/target/aarch64-linux-android/release/libdecryptor.so libdecryptor_aarch64.so
          cp rust_crypto/target/x86_64-linux-android/release/libdecryptor.so libdecryptor_x86_64.so
          mv loader.py main.py

      - name: 🚀 执行跨平台安卓打包
        run: |
          flet build apk

      - name: 📤 输出最终安装包
        uses: actions/upload-artifact@v4
        with:
          name: AppleCalculator-v1.0-APK
          path: build/apk/**/*.apk

# ===========================================================================
# 👇 下面这段是修好的自动部署服务器，不会再报错
# ===========================================================================
# 下面这段是修好的自动部署服务器，不会再报错
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 安装阿里云CLI
        uses: aliyun/setup-aliyun-cli-action@v1
        with:
          version: latest
  
      - name: 自动部署到服务器
        run: |
          aliyun ecs RunCommand \
            --RegionId cn-guangzhou \
            --InstanceId i-7xv9ana74ptpoez4wvf4 \
            --CommandContent "cd /opt/myapp && git pull && pkill -f 'main.py' || true && nohup python3 main.py > app.log 2>&1 &" \
            --Type RunShellScript \
            --Username deploy \
            --Timeout 120
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION: cn-guangzhou
